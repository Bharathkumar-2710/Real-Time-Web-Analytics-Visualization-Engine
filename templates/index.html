<!doctype html>
<html>
<head>
  <title>Real‑Time Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <h1>Real‑Time Analytics Dashboard</h1>

  <!-- Upload CSV -->
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      <label>Upload your CSV (marketing_spend, user_signups):</label>
      <input type="file" name="file" accept=".csv" required>
      <button type="submit">Use this CSV</button>
    </form>
  </div>

  <div class="card">
    <p>Marketing Spend ↔ User Signups correlation: <strong>{{ correlation }}</strong></p>
    <p>Records: {{ n }}</p>
  </div>

  <div class="card chart-container">
    <canvas id="scatterChart"></canvas>
  </div>

  <script>
    const ctx = document.getElementById("scatterChart").getContext("2d");
    let scatterChart;

    function updateChart() {
      fetch("/api/data")
        .then(response => response.json())
        .then(data => {
          const spends = data.map(d => d.marketing_spend);
          const signups = data.map(d => d.user_signups);

          const datasets = [{
            label: "User Signups vs Marketing Spend",
            data: spends.map((spend, i) => ({
              x: spend,
              y: signups[i]
            })),
            backgroundColor: "rgba(54, 162, 235, 0.5)",
            borderColor: "rgba(54, 162, 235, 1)",
            showLine: false,
            pointRadius: 5
          }];

          if (!scatterChart) {
            scatterChart = new Chart(ctx, {
              type: "scatter",
              data: { datasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  x: { title: { display: true, text: "Marketing Spend" } },
                  y: { title: { display: true, text: "User Signups" } }
                },
                plugins: { legend: { display: false } }
              }
            });
          } else {
            scatterChart.data.datasets[0].data = datasets[0].data;
            scatterChart.update();
          }
        });
    }

    updateChart();
    setInterval(updateChart, 5000);
  </script>
</body>
</html>
