<!doctype html>
<html>
<head>
  <title>Real‑Time Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <h1>Real‑Time Analytics Dashboard</h1>

  <!-- Upload CSV -->
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      <label>Upload your CSV (marketing_spend, user_signups):</label>
      <input type="file" name="file" accept=".csv" required>
      <button type="submit">Use this CSV</button>
    </form>
  </div>

  <div class="card">
    <label for="chartType">Change Chart Type:</label>
    <select id="chartType" onchange="updateChart()">
      <option value="scatter">Scatter Plot</option>
      <option value="line">Line Chart</option>
      <option value="bar">Bar Chart</option>
    </select>
  </div>

  <div class="card">
    <p>Marketing Spend ↔ User Signups correlation: <strong>{{ correlation }}</strong></p>
    <p>Records: {{ n }}</p>
  </div>

  <div class="card chart-container">
    <canvas id="scatterChart"></canvas>
  </div>

  <script>
    const ctx = document.getElementById("scatterChart").getContext("2d");
    let scatterChart;

    function updateChart() {
      // Safely get the type, default to "scatter" if dropdown is missing
      const typeElement = document.getElementById("chartType");
      const type = typeElement ? typeElement.value : "scatter";
      
      fetch("/api/data")
        .then(response => response.json())
        .then(data => {
          const spends = data.map(d => d.marketing_spend);
          const signups = data.map(d => d.user_signups);

          const datasets = [{
            label: "User Signups vs Marketing Spend",
            data: type === "bar" ? signups : spends.map((spend, i) => ({ x: spend, y: signups[i] })),
            backgroundColor: "rgba(54, 162, 235, 0.5)",
            borderColor: "rgba(54, 162, 235, 1)",
            showLine: type === "line",
            pointRadius: (type === "scatter" || type === "line") ? 5 : 0
          }];

          if (scatterChart) {
            scatterChart.destroy();
          }

          scatterChart = new Chart(ctx, {
            type: type,
            data: { 
              labels: type === "bar" ? spends : undefined,
              datasets 
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                x: { 
                  title: { display: true, text: "Marketing Spend" },
                  ticks: { maxRotation: 45, minRotation: 45 } 
                },
                y: { 
                  title: { display: true, text: "User Signups" } 
                }
              },
              plugins: { legend: { display: false } }
            }
          });
        });
    }

    // Initial load
    updateChart();
    // Auto-refresh every 5 seconds
    setInterval(updateChart, 5000);
  </script>
</body>
</html>
